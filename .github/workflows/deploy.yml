name: Build & Deploy

on:
  push:
    branches: [main]

jobs:

  # ─────────────────────────────────────────────
  # Job 1 — Build Docker image and push to Docker Hub
  # ─────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/solar-forecast:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/solar-forecast:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Job 2 — Provision infra with Terraform
  # Runs only after image is successfully pushed
  # ─────────────────────────────────────────────
