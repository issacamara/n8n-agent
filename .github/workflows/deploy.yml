name: Build & Deploy

on:
  push:
    branches: [main]

jobs:

  # ─────────────────────────────────────────────
  # Job 1 — Build Docker image and push to Docker Hub
  # ─────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: scripts/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/solar-forecast:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/solar-forecast:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Job 2 — Provision infra with Terraform
  # Runs only after image is successfully pushed
  # ─────────────────────────────────────────────
  deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="twilio_account_sid=${{ secrets.TWILIO_ACCOUNT_SID }}" \
            -var="twilio_auth_token=${{ secrets.TWILIO_AUTH_TOKEN }}" \
            -var="twilio_whatsapp_to=${{ secrets.TWILIO_WHATSAPP_TO }}"
